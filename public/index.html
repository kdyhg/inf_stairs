<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>INF STAIRS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-shell" aria-label="INF STAIRS game">
        <div id="stage" class="stage is-menu" tabindex="0" aria-label="계단 게임 화면">
          <div class="hud">
            <div class="score-card">
              <span class="coin" aria-hidden="true"></span>
              <strong id="score">0</strong>
              <span>F</span>
            </div>
            <div class="timer-wrap" aria-label="남은 시간">
              <div id="timerBar" class="timer-bar"></div>
              <span id="timerText">20.0</span>
            </div>
          </div>

          <div id="stairLayer" class="stair-layer"></div>
          <div id="player" class="player" aria-hidden="true">
            <img src="assets/office-worker.png" alt="" />
          </div>

          <div id="startOverlay" class="start-screen">
            <form id="startForm" class="start-menu">
              <div class="logo-mark" aria-hidden="true">
                <span>INFINITE</span>
                <strong>무한의 계단</strong>
              </div>
              <p class="menu-copy">닉네임을 입력하고 20초 동안 최고층에 도전하세요.</p>
              <label for="nickname">닉네임</label>
              <input id="nickname" name="nickname" maxlength="16" autocomplete="off" placeholder="랭킹에 표시될 이름" required />
              <button class="play-button" type="submit">PLAY</button>
            </form>
          </div>

          <div id="endOverlay" class="overlay hidden">
            <div class="dialog">
              <p class="dialog-kicker" id="endReason">TIME UP</p>
              <h2><span id="finalScore">0</span>층</h2>
              <button id="restartButton" type="button">다시 시작</button>
            </div>
          </div>
        <div class="control-strip">
          <span>← / → 한 칸</span>
          <span>Shift + ← / → 두 칸</span>
          <span>방향을 틀리면 종료</span>
        </div>
        </div>
      </section>

      <aside class="ranking-panel" aria-label="랭킹">
        <div class="ranking-head">
          <div>
            <p class="eyebrow">server ranking</p>
            <h2>랭킹</h2>
          </div>
          <button id="refreshRankings" type="button" aria-label="랭킹 새로고침">새로고침</button>
        </div>
        <ol id="rankingList" class="ranking-list"></ol>
        <p id="rankingStatus" class="ranking-status" role="status">랭킹을 불러오는 중...</p>
      </aside>
    </main>

    <script src="game.js" type="module"></script>
  </body>
</html>
